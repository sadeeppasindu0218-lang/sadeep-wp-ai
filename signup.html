<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — KEBERA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 120px 20px 60px; }
    .auth-card { width: 100%; max-width: 420px; padding: 40px; border-radius: var(--radius); background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); }
    .auth-card h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; text-align: center; }
    .auth-card p { color: var(--text-secondary); font-size: 14px; text-align: center; margin-bottom: 28px; }
    .auth-error { background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.2); border-radius: 8px; padding: 10px 14px; color: var(--danger); font-size: 13px; margin-bottom: 16px; display: none; }
    .auth-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text-secondary); font-size: 12px; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="../index.html" class="nav-logo">KEBERA</a>
    <button class="menu-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="../shop.html">Shop</a></li>
      <li><a href="../about.html">About</a></li>
      <li><a href="../cart.html" class="cart-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-count">0</span>
      </a></li>
    </ul>
  </nav>

  <div class="auth-page">
    <div class="auth-card glass">
      <h1>Create Account</h1>
      <p>Join KEBERA to enjoy express checkout and order tracking.</p>
      <div class="auth-error" id="signup-error"></div>
      <div class="auth-error" id="signup-success" style="background:rgba(76,175,80,0.1);border-color:rgba(76,175,80,0.2);color:var(--success)"></div>
      <form id="signup-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="full-name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required minlength="6" placeholder="At least 6 characters">
        </div>
        <button type="submit" class="glass-button" style="width:100%;justify-content:center">Sign Up</button>
      </form>
      <div class="auth-divider">or</div>
      <button id="google-signup" class="glass-button glass-button-outline" style="width:100%;justify-content:center;gap:10px">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign up with Google
      </button>
      <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-secondary)">
        Already have an account? <a href="login.html" style="color:var(--accent-1);text-decoration:none">Sign In</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
  <script>
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorDiv = document.getElementById('signup-error');
      const successDiv = document.getElementById('signup-success');
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      const result = await signUp(email, password);
      btn.disabled = false;
      btn.textContent = 'Sign Up';

      if (result.error) {
        errorDiv.textContent = result.error.message || 'Sign up failed';
        errorDiv.style.display = 'block';
        return;
      }

      successDiv.textContent = 'Account created! Check your email for confirmation.';
      successDiv.style.display = 'block';
    });

    document.getElementById('google-signup').addEventListener('click', async () => {
      const result = await signInWithGoogle();
      if (result.error) {
        document.getElementById('signup-error').textContent = result.error.message;
        document.getElementById('signup-error').style.display = 'block';
      }
    });

    // Nav script
    document.querySelector('.menu-toggle')?.addEventListener('click', () => {
      document.querySelector('.nav-links')?.classList.toggle('open');
    });
  </script>
</body>
</html>
