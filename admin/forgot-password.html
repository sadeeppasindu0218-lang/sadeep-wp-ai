<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — KEBERA Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card glass">
      <h1>Reset Password</h1>
      <p>Enter your email and we'll send you a reset link.</p>
      <div class="login-error" id="reset-error"></div>
      <div class="login-error" id="reset-success" style="background:rgba(76,175,80,0.1);border-color:rgba(76,175,80,0.2);color:var(--success)"></div>
      <form id="reset-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required placeholder="admin@kebera.com">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">
          Send Reset Link
        </button>
      </form>
      <div style="text-align:center;margin-top:16px">
        <a href="index.html" style="color:var(--text-muted);font-size:13px;text-decoration:none">← Back to login</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
  <script>
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      const result = await resetPassword(email);
      document.getElementById('reset-error').style.display = 'none';
      const success = document.getElementById('reset-success');

      if (result.error) {
        document.getElementById('reset-error').textContent = result.error.message;
        document.getElementById('reset-error').style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
        return;
      }

      success.textContent = 'Check your email for the password reset link.';
      success.style.display = 'block';
      btn.textContent = 'Sent ✓';
    });
  </script>
</body>
</html>
