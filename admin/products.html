<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — KEBERA Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">KEBERA</div>
      <ul class="sidebar-nav">
        <li><a href="dashboard.html">📊 Dashboard</a></li>
        <li><a href="products.html" class="active">🛍️ Products</a></li>
        <li><a href="settings.html">⚙️ Settings</a></li>
        <li><a href="orders.html">📦 Orders</a></li>
      </ul>
    </aside>
    <main class="main-area">
      <div class="admin-header">
        <h1>Products</h1>
        <button class="btn btn-primary" onclick="openModal()">+ Add Product</button>
      </div>

      <table class="data-table" id="products-table">
        <thead>
          <tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="products-body"></tbody>
      </table>

      <!-- Add/Edit Modal -->
      <div class="modal" id="product-modal">
        <div class="modal-content">
          <h2 id="modal-title">Add Product</h2>
          <form id="product-form">
            <input type="hidden" id="edit-id">
            <div class="form-group">
              <label>Product Name</label>
              <input type="text" id="p-name" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Category</label>
                <select id="p-category">
                  <option value="outerwear">Outerwear</option>
                  <option value="dresses">Dresses</option>
                  <option value="tops">Tops</option>
                  <option value="bottoms">Bottoms</option>
                  <option value="accessories">Accessories</option>
                </select>
              </div>
              <div class="form-group">
                <label>Price (LKR)</label>
                <input type="number" id="p-price" required min="0">
              </div>
            </div>
            <div class="form-group">
              <label>Image URL</label>
              <input type="url" id="p-image" placeholder="https://..." required>
              <img id="p-image-preview" class="img-preview" style="display:none">
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea id="p-description" rows="3"></textarea>
            </div>
            <div class="form-group">
              <label>Sizes (comma separated)</label>
              <input type="text" id="p-sizes" value="S,M,L,XL">
            </div>
            <div style="display:flex;gap:12px;margin-top:20px">
              <button type="submit" class="btn btn-primary" id="modal-save">Save Product</button>
              <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script type="importmap">
  { "imports": { "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm" } }
  </script>
  <script src="../js/supabase.js"></script>
  <script>
    let editingId = null;

    document.addEventListener('DOMContentLoaded', async () => {
      const session = await getAdminSession();
      if (!session) { window.location.href = 'index.html'; return; }
      await loadProductsTable();

      document.getElementById('product-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        await saveProduct();
      });

      document.getElementById('p-image').addEventListener('input', (e) => {
        const preview = document.getElementById('p-image-preview');
        if (e.target.value) {
          preview.src = e.target.value;
          preview.style.display = 'block';
        } else {
          preview.style.display = 'none';
        }
      });
    });

    async function loadProductsTable() {
      const { data } = await adminGetAllProducts();
      const tbody = document.getElementById('products-body');
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><h3>No products yet</h3><p>Add your first product to get started.</p></div></td></tr>';
        return;
      }
      tbody.innerHTML = data.map(p => `
        <tr>
          <td><img src="${p.image_url}" style="width:40px;height:50px;object-fit:cover;border-radius:4px" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%231a1a2e%22 width=%22100%22 height=%22100%22/></svg>'"></td>
          <td><strong>${p.name}</strong></td>
          <td>${p.category}</td>
          <td>Rs. ${p.price?.toLocaleString()}</td>
          <td style="color:${p.is_active ? 'var(--success)' : 'var(--danger)'}">${p.is_active ? 'Active' : 'Hidden'}</td>
          <td>
            <button class="btn btn-outline btn-sm" onclick="editProduct(${p.id})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    function openModal(product = null) {
      editingId = null;
      document.getElementById('modal-title').textContent = 'Add Product';
      document.getElementById('edit-id').value = '';
      document.getElementById('p-name').value = '';
      document.getElementById('p-category').value = 'outerwear';
      document.getElementById('p-price').value = '';
      document.getElementById('p-image').value = '';
      document.getElementById('p-image-preview').style.display = 'none';
      document.getElementById('p-description').value = '';
      document.getElementById('p-sizes').value = 'S,M,L,XL';
      document.getElementById('modal-save').textContent = 'Save Product';
      document.getElementById('product-modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('product-modal').classList.remove('open');
    }

    async function editProduct(id) {
      const { data } = await adminGetAllProducts();
      const p = data.find(x => x.id === id);
      if (!p) return;
      editingId = id;
      document.getElementById('modal-title').textContent = 'Edit Product';
      document.getElementById('edit-id').value = id;
      document.getElementById('p-name').value = p.name;
      document.getElementById('p-category').value = p.category;
      document.getElementById('p-price').value = p.price;
      document.getElementById('p-image').value = p.image_url || '';
      if (p.image_url) {
        document.getElementById('p-image-preview').src = p.image_url;
        document.getElementById('p-image-preview').style.display = 'block';
      }
      document.getElementById('p-description').value = p.description || '';
      document.getElementById('p-sizes').value = (p.sizes || []).join(',');
      document.getElementById('modal-save').textContent = 'Update Product';
      document.getElementById('product-modal').classList.add('open');
    }

    async function saveProduct() {
      const data = {
        name: document.getElementById('p-name').value,
        category: document.getElementById('p-category').value,
        price: parseInt(document.getElementById('p-price').value),
        image_url: document.getElementById('p-image').value,
        description: document.getElementById('p-description').value,
        sizes: document.getElementById('p-sizes').value.split(',').map(s => s.trim()).filter(Boolean)
      };

      const editId = document.getElementById('edit-id').value;
      let result;
      if (editId) {
        result = await adminUpdateProduct(parseInt(editId), data);
      } else {
        result = await adminCreateProduct(data);
      }

      if (result.error) { alert('Error: ' + result.error.message); return; }
      closeModal();
      await loadProductsTable();
    }

    async function deleteProduct(id) {
      if (!confirm('Delete this product?')) return;
      const { error } = await adminDeleteProduct(id);
      if (error) { alert('Error: ' + error.message); return; }
      await loadProductsTable();
    }
  </script>
</body>
</html>
