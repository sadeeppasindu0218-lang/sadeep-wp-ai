<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — KEBERA Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">KEBERA</div>
      <ul class="sidebar-nav">
        <li><a href="dashboard.html" class="active">📊 Dashboard</a></li>
        <li><a href="products.html">🛍️ Products</a></li>
        <li><a href="settings.html">⚙️ Settings</a></li>
        <li><a href="orders.html">📦 Orders</a></li>
      </ul>
    </aside>
    <main class="main-area">
      <div class="admin-header">
        <h1>Dashboard</h1>
        <div style="display:flex;align-items:center;gap:12px">
          <span id="admin-email" style="font-size:13px;color:var(--text-muted)"></span>
          <button class="logout-btn" onclick="handleLogout()">🚪 Sign Out</button>
        </div>
      </div>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><h3>Total Products</h3><div class="value accent" id="stat-products">—</div></div>
        <div class="stat-card"><h3>Total Orders</h3><div class="value warning" id="stat-orders">—</div></div>
        <div class="stat-card"><h3>Pending</h3><div class="value" id="stat-pending" style="color:var(--warning)">—</div></div>
        <div class="stat-card"><h3>Revenue</h3><div class="value success" id="stat-revenue">Rs. —</div></div>
      </div>
      <div class="form-card">
        <h2>Quick Actions</h2>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <a href="products.html" class="btn btn-primary">+ Add Product</a>
          <a href="orders.html" class="btn btn-outline">📦 View Orders</a>
          <a href="settings.html" class="btn btn-outline">⚙️ Site Settings</a>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
  <script>
    async function handleLogout() {
      await signOut();
      window.location.href = 'index.html';
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const session = await getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      
      const user = await getUser();
      const isAdmin = await isAdminEmail(user?.email);
      if (!isAdmin) {
        await signOut();
        window.location.href = 'index.html';
        return;
      }

      document.getElementById('admin-email').textContent = user?.email || '';

      const { data: products } = await adminGetAllProducts();
      const { data: orders } = await adminGetOrders();

      document.getElementById('stat-products').textContent = products?.length || 0;
      document.getElementById('stat-orders').textContent = orders?.length || 0;
      document.getElementById('stat-pending').textContent = orders?.filter(o => o.status === 'pending').length || 0;
      document.getElementById('stat-revenue').textContent = 'Rs. ' + (orders?.reduce((s,o) => s + (o.total||0), 0) || 0).toLocaleString();
    });
  </script>
</body>
</html>
