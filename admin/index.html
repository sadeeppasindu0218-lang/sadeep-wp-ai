<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — KEBERA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card glass">
      <h1>KEBERA</h1>
      <p>Admin Panel — Sign in to manage your store</p>
      <div class="login-error" id="login-error"></div>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required placeholder="admin@kebera.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">
          Sign In
        </button>
      </form>
      <div style="text-align:center;margin-top:20px">
        <a href="../index.html" style="color:var(--text-muted);font-size:13px;text-decoration:none">← Back to site</a>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
    }
  }
  </script>
  <script src="../js/supabase.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const errorDiv = document.getElementById('login-error');
    const emailInput = document.getElementById('email');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorDiv.style.display = 'none';
      const email = emailInput.value;
      const password = document.getElementById('password').value;
      const btn = form.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const result = await adminLogin(email, password);
        if (result.error) {
          errorDiv.textContent = result.error;
          errorDiv.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorDiv.textContent = 'Connection error. Check Supabase config.';
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
