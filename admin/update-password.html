<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Password — KEBERA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card glass">
      <h1>Set New Password</h1>
      <p>Enter your new password below.</p>
      <div class="login-error" id="update-error"></div>
      <form id="update-form">
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="password" required minlength="6" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirm" required minlength="6" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">
          Update Password
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
  <script>
    document.getElementById('update-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const errorDiv = document.getElementById('update-error');
      errorDiv.style.display = 'none';

      if (pw !== confirm) {
        errorDiv.textContent = 'Passwords do not match.';
        errorDiv.style.display = 'block';
        return;
      }

      const sb = getSupabase();
      if (!sb) { errorDiv.textContent = 'Supabase not loaded'; errorDiv.style.display = 'block'; return; }

      const { error } = await sb.auth.updateUser({ password: pw });
      if (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
        return;
      }

      document.querySelector('.login-card').innerHTML = `
        <div style="text-align:center;padding:40px 20px">
          <div style="font-size:48px;margin-bottom:16px">✓</div>
          <h2 style="margin-bottom:12px">Password Updated!</h2>
          <p style="color:var(--text-muted);margin-bottom:24px">Your password has been changed successfully.</p>
          <a href="index.html" class="btn btn-primary" style="display:inline-flex">Sign In</a>
        </div>
      `;
    });
  </script>
</body>
</html>
