<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — KEBERA</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">KEBERA</a>
    <button class="menu-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li>
        <a href="cart.html" class="cart-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-count">0</span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="product-detail" id="product-detail">
    <div id="product-content"></div>
  </div>

  <footer class="footer">
    <div class="footer-grid">
      <div class="footer-col">
        <h4>KEBERA</h4>
        <a href="about.html">About</a>
        <a href="shop.html">Collections</a>
        <a href="#">Careers</a>
      </div>
      <div class="footer-col">
        <h4>Support</h4>
        <a href="#">Contact</a>
        <a href="#">Shipping</a>
        <a href="#">Returns</a>
        <a href="#">FAQ</a>
      </div>
      <div class="footer-col">
        <h4>Connect</h4>
        <a href="#">Instagram</a>
        <a href="#">Facebook</a>
        <a href="#">Pinterest</a>
      </div>
      <div class="footer-col">
        <h4>Legal</h4>
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
      </div>
    </div>
    <div class="footer-bottom">
      &copy; 2026 KEBERA. All rights reserved. Crafted with precision.
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const dbProducts = await loadProductsFromDB();
      if (dbProducts && dbProducts.length > 0) {
        products = dbProducts;
      } else {
        await loadProducts();
      }
      const urlParams = new URLSearchParams(window.location.search);
      const id = parseInt(urlParams.get('id'));
      const product = products.find(p => p.id === id);

      const container = document.getElementById('product-content');

      if (!product) {
        container.innerHTML = `
          <div style="text-align:center;padding:80px 20px">
            <h2>Product not found</h2>
            <p style="color:var(--text-secondary);margin:12px 0 24px">This piece may have been moved or is no longer available.</p>
            <a href="shop.html" class="glass-button">Back to Shop</a>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <div class="product-detail-layout">
          <div class="product-detail-image glass">
            <img src="${product.image}" alt="${product.name}">
          </div>
          <div class="product-detail-info">
            <span class="product-detail-category">${product.category}</span>
            <h1>${product.name}</h1>
            <div class="product-detail-price">Rs. ${product.price.toLocaleString()}</div>
            <p class="product-detail-description">${product.description}</p>
            <div class="size-selector">
              <h3>Select Size</h3>
              <div class="size-options">
                ${product.sizes.map(s => `<button class="size-option" data-size="${s}">${s}</button>`).join('')}
              </div>
            </div>
            <button class="glass-button" onclick="addToCart(${product.id})" style="width:100%;justify-content:center">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
              Add to Cart — Rs. ${product.price.toLocaleString()}
            </button>
          </div>
        </div>
      `;

      document.querySelectorAll('.size-option').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.size-option').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
      });
    });
  </script>
</body>
</html>
